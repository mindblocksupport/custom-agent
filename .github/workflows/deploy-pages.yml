name: Deploy RAG Knowledge Map to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/rag-knowledge-map.md'
      - 'docs/agentic-rag-knowledge-map.md'
      - 'docs/index.html'
      - 'scripts/md_to_html.py'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install markdown

      - name: Generate HTML
        run: |
          python3 scripts/md_to_html.py docs/rag-knowledge-map.md docs/rag-knowledge-map.html
          python3 scripts/md_to_html.py docs/agentic-rag-knowledge-map.md docs/agentic-rag-knowledge-map.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
