<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Custom Agent · MVP Lite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f5f5f7; color: #1d1d1f; height: 100vh;
      }
      .container {
        max-width: 800px; margin: 0 auto; height: 100vh;
        display: flex; flex-direction: column; padding: 16px;
      }
      header { padding: 12px 0 16px; border-bottom: 1px solid #e5e5ea; }
      h1 { font-size: 22px; font-weight: 600; }
      .subtitle { font-size: 12px; color: #86868b; margin-top: 4px; }
      .config-bar {
        display: flex; gap: 8px; padding: 8px 0; font-size: 12px; align-items: center;
        border-bottom: 1px solid #e5e5ea; color: #86868b;
      }
      .config-bar input {
        flex: 1; padding: 4px 8px; font-size: 12px; border: 1px solid #d2d2d7; border-radius: 6px;
      }
      .status { padding: 4px 8px; border-radius: 6px; font-weight: 600; }
      .status.ok { background: #d1f4d1; color: #006400; }
      .status.bad { background: #ffd1d1; color: #c00; }
      .messages {
        flex: 1; overflow-y: auto; padding: 16px 0;
        display: flex; flex-direction: column; gap: 12px;
      }
      .empty { text-align: center; color: #86868b; padding: 60px 20px; font-size: 14px; }
      .examples { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; align-items: center; }
      .example {
        display: inline-block; padding: 6px 12px; background: #fff;
        border: 1px solid #e5e5ea; border-radius: 999px; cursor: pointer; font-size: 13px;
      }
      .example:hover { border-color: #007aff; color: #007aff; }
      .msg {
        padding: 12px 16px; border-radius: 12px; max-width: 80%;
        white-space: pre-wrap; word-wrap: break-word; line-height: 1.5; font-size: 14px;
      }
      .msg-user { background: #007aff; color: white; align-self: flex-end; }
      .msg-assistant { background: white; align-self: flex-start; border: 1px solid #e5e5ea; }
      .msg-tool {
        background: #f0f7ff; align-self: flex-start;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px; border: 1px dashed #b8d8ff; color: #0040a0; max-width: 90%;
      }
      .msg-error { background: #fff0f0; color: #c00; align-self: flex-start; border: 1px solid #ffcccc; }
      .composer { display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid #e5e5ea; }
      .composer input {
        flex: 1; padding: 12px 16px; border: 1px solid #d2d2d7;
        border-radius: 10px; font-size: 14px; outline: none;
      }
      .composer input:focus { border-color: #007aff; }
      .composer button {
        padding: 12px 24px; background: #007aff; color: white;
        border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      .composer button:disabled { background: #d2d2d7; cursor: not-allowed; }
      .debug {
        margin-top: 8px; padding: 8px; background: #1c1c1e; color: #00ff00;
        font-family: ui-monospace, Menlo, monospace; font-size: 11px;
        border-radius: 6px; max-height: 120px; overflow-y: auto; white-space: pre-wrap;
      }
      .debug-bar { display: flex; justify-content: space-between; font-size: 11px; padding-top: 4px; }
      .debug-bar a { color: #007aff; cursor: pointer; text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Custom Agent</h1>
        <p class="subtitle">Enterprise Agent Platform · Lite</p>
      </header>

      <div class="config-bar">
        <span>Backend:</span>
        <input id="backend" value="http://localhost:8000" />
        <span>Key:</span>
        <input id="apikey" value="dev-key-change-me" />
        <span id="status" class="status">checking...</span>
      </div>

      <div id="messages" class="messages">
        <div class="empty" id="empty">
          <div>👋 Click an example or type below:</div>
          <div class="examples">
            <span class="example" onclick="window.send('现在几点？')">现在几点？</span>
            <span class="example" onclick="window.send('Calculate sqrt(144) + 23 * 47')">Calculate sqrt(144) + 23 * 47</span>
            <span class="example" onclick="window.send('用一首五言绝句解释 RAG')">用五言绝句解释 RAG</span>
            <span class="example" onclick="window.send('北京时间几点？算下 99 * 88')">北京时间 + 99×88</span>
          </div>
        </div>
      </div>

      <form class="composer" onsubmit="window.onSubmit(event)">
        <input id="input" placeholder="Ask anything..." autofocus autocomplete="off" />
        <button id="sendBtn" type="submit">Send</button>
      </form>

      <div class="debug-bar">
        <span>调试日志（出问题时看这里）：</span>
        <a onclick="document.getElementById('debug').innerHTML=''">清空</a>
      </div>
      <div id="debug" class="debug">init...</div>
    </div>

    <script>
      "use strict";

      const $messages = document.getElementById("messages");
      const $input = document.getElementById("input");
      const $sendBtn = document.getElementById("sendBtn");
      const $status = document.getElementById("status");
      const $debug = document.getElementById("debug");

      let history = [];
      let streaming = false;
      let msgCounter = 0;

      function log(msg) {
        const ts = new Date().toLocaleTimeString();
        $debug.textContent += `\n[${ts}] ${msg}`;
        $debug.scrollTop = $debug.scrollHeight;
        console.log(msg);
      }

      log("✓ chat.html loaded");

      // ---- Health ----
      async function checkHealth() {
        try {
          const url = document.getElementById("backend").value.replace(/\/$/, "") + "/health/";
          const r = await fetch(url);
          if (r.ok) {
            $status.textContent = "✓ backend OK";
            $status.className = "status ok";
          } else {
            $status.textContent = "✗ HTTP " + r.status;
            $status.className = "status bad";
          }
        } catch (e) {
          $status.textContent = "✗ unreachable";
          $status.className = "status bad";
          log("health check failed: " + e.message);
        }
      }
      checkHealth();
      setInterval(checkHealth, 10000);

      // ---- DOM helpers ----
      function addMsg(role, content) {
        const empty = document.getElementById("empty");
        if (empty) empty.remove();
        const id = "msg-" + (++msgCounter);
        const div = document.createElement("div");
        div.className = "msg msg-" + role;
        div.id = id;
        div.textContent = content;
        $messages.appendChild(div);
        $messages.scrollTop = $messages.scrollHeight;
        return id;
      }

      function updateMsg(id, content) {
        const el = document.getElementById(id);
        if (!el) {
          log("⚠️ updateMsg: element not found: " + id);
          return;
        }
        el.textContent = content;
        $messages.scrollTop = $messages.scrollHeight;
      }

      // ---- Send ----
      window.send = async function send(text) {
        text = (text || "").trim();
        if (!text) {
          log("send: empty text, skip");
          return;
        }
        if (streaming) {
          log("send: still streaming, skip");
          return;
        }

        log("send: " + text);
        addMsg("user", text);
        const apiMessages = [...history, { role: "user", content: text }];
        history.push({ role: "user", content: text });

        $input.value = "";
        streaming = true;
        $sendBtn.disabled = true;

        let assistantId = null;
        let assistantText = "";

        const ensureAssistant = () => {
          if (assistantId === null) {
            assistantId = addMsg("assistant", "");
            assistantText = "";
            log("created assistant msg " + assistantId);
          }
        };

        try {
          const backend = document.getElementById("backend").value.replace(/\/$/, "");
          const key = document.getElementById("apikey").value;
          const url = backend + "/v1/chat/completions";
          log("POST " + url);

          const res = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + key,
            },
            body: JSON.stringify({ messages: apiMessages, stream: true }),
          });

          log("response status: " + res.status);
          if (!res.ok || !res.body) {
            const errText = await res.text().catch(() => "");
            throw new Error("HTTP " + res.status + ": " + errText);
          }

          // 记录关键响应头（debug proxy 行为）
          log("ct=" + res.headers.get("content-type") + " te=" + res.headers.get("transfer-encoding"));

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          let eventCount = 0;
          let totalBytes = 0;
          let chunkCount = 0;

          while (true) {
            const { done, value } = await reader.read();
            if (done) {
              log("stream ended (events=" + eventCount + ", text=" + assistantText.length + " chars, bytes=" + totalBytes + ", chunks=" + chunkCount + ")");
              if (totalBytes > 0 && eventCount === 0) {
                log("⚠️ raw body (first 500): " + buffer.slice(0, 500).replace(/\n/g, "\\n"));
              }
              break;
            }
            chunkCount++;
            totalBytes += value.length;
            buffer += decoder.decode(value, { stream: true });

            // SSE spec 允许 \r\n / \n / \r —— 先归一化再 split
            buffer = buffer.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
            const events = buffer.split("\n\n");
            buffer = events.pop() || "";

            for (const ev of events) {
              if (!ev.trim()) continue;
              eventCount++;

              // 提取 data: 行（可能多行 data:）
              let dataStr = "";
              for (const line of ev.split("\n")) {
                if (line.startsWith("data:")) {
                  dataStr += line.slice(5).trim();
                }
              }
              if (!dataStr || dataStr === "[DONE]") continue;

              let event;
              try {
                event = JSON.parse(dataStr);
              } catch (e) {
                log("⚠️ parse fail: " + dataStr.slice(0, 80));
                continue;
              }

              switch (event.type) {
                case "start":
                  log("← start: " + (event.data?.model || ""));
                  break;
                case "token":
                  ensureAssistant();
                  assistantText += event.text || "";
                  updateMsg(assistantId, assistantText);
                  break;
                case "tool_call":
                  assistantId = null; // 下个 token 重新创建一段
                  addMsg("tool", "🔧 " + event.data.name + "(" + (event.data.arguments || "{}") + ")");
                  log("← tool_call: " + event.data.name);
                  break;
                case "tool_result": {
                  const out = event.data.result || event.data.error || "";
                  addMsg("tool", "← " + String(out).slice(0, 300));
                  log("← tool_result");
                  break;
                }
                case "done":
                  log("← done: " + JSON.stringify(event.data || {}));
                  break;
                case "error":
                  addMsg("error", "❌ " + (event.text || "error"));
                  log("← error: " + event.text);
                  break;
                default:
                  log("? unknown event: " + event.type);
              }
            }
          }

          if (assistantText) {
            history.push({ role: "assistant", content: assistantText });
          }
        } catch (e) {
          const msg = e?.message || String(e);
          addMsg("error", "❌ " + msg);
          log("✗ ERROR: " + msg);
        } finally {
          streaming = false;
          $sendBtn.disabled = false;
          $input.focus();
        }
      };

      window.onSubmit = function (e) {
        e.preventDefault();
        window.send($input.value);
      };

      log("ready");
    </script>
  </body>
</html>
