[project]
name = "custom-agent-sdk"
version = "0.1.0"
description = "Python SDK for Custom Agent Platform"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Custom Agent" }]
license = { text = "MIT" }
keywords = ["agent", "llm", "ai", "deepseek", "openai", "anthropic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
]
# 故意不依赖 workspace - SDK 必须 standalone, 可独立 pip install
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
    "httpx-sse>=0.4",
]

[project.urls]
Homepage = "https://github.com/example/custom-agent"
Documentation = "https://github.com/example/custom-agent/tree/main/packages/sdk-python"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/custom_agent_sdk"]
