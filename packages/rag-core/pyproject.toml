[project]
name = "rag-core"
version = "0.1.0"
description = "RAG core library: chunking, embedding, retrieval, pgvector storage (L37 plan)"
requires-python = ">=3.11"
dependencies = [
    "psycopg[binary]>=3.2",          # sync + async PG driver
    "pgvector>=0.3",                 # VECTOR type + register_vector
    "numpy>=1.26",
    "pydantic>=2.9",
    "click>=8.1",                    # CLI
    "jieba>=0.42",                   # 中文分词 (BM25 预切分)
    "schemas",                       # workspace shared types
]

[project.optional-dependencies]
# 嵌入 + 重排模型只在生产装; CI 用 hash backend
embed = [
    "sentence-transformers>=3.0",
    "torch>=2.2",
]
# LiteLLM client (Contextual Chunking + HyDE + multi-query 用)
llm = [
    "litellm>=1.50",
]

[project.scripts]
rag = "rag_core.cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_core"]
